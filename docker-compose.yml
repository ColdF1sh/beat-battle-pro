services:
  postgres:
    image: postgres:16
    container_name: beat_battle_postgres
    restart: always
    environment:
      POSTGRES_USER: beatbattle
      POSTGRES_PASSWORD: beatbattle_password
      POSTGRES_DB: beatbattle
    ports:
      - "5432:5432"
    volumes:
      - beatbattle_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: beat_battle_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - beatbattle_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: beat_battle_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/beat-battle-audio;
      mc anonymous set download local/beat-battle-audio;
      "

  analyzer:
    image: beat-battle-analyzer:local
    build:
      context: .
      dockerfile: docker/analyzer/Dockerfile
    working_dir: /app
    profiles:
      - tools
    command: python scripts/analyzer-server.py
    environment:
      ANALYZER_SERVICE_CONCURRENCY: "1"
    ports:
      - "8765:8765"
    volumes:
      - ./public/demo-audio:/app/public/demo-audio:ro

volumes:
  beatbattle_pg_data:
  beatbattle_minio_data:
